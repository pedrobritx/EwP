<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

		<meta
			name="description"
			content="English with Pedro — online English lessons, plus teaching tools and translation software for educators and translators."
		/>
		<meta
			name="keywords"
			content="English teacher, ESL, EFL, online lessons, learn English, lesson framework, translation tool, Verbalis, Pedro Brito"
		/>
		<meta name="theme-color" content="#0a0e1a" media="(prefers-color-scheme: dark)" />
		<meta name="theme-color" content="#f4f1ec" media="(prefers-color-scheme: light)" />

		<meta property="og:title" content="English with Pedro" />
		<meta
			property="og:description"
			content="Online English lessons, teaching tools, and translation software — all in one place."
		/>
		<meta property="og:image" content="logo.png" />
		<meta property="og:type" content="website" />

		<title>English with Pedro</title>

		<link rel="icon" type="image/png" href="logo.png" />

		<!-- Set theme before first paint to avoid flash of wrong theme. -->
		<script>
			(function () {
				try {
					var stored = localStorage.getItem("ewp-theme");
					var theme =
						stored ||
						(window.matchMedia &&
						window.matchMedia("(prefers-color-scheme: light)").matches
							? "light"
							: "dark");
					document.documentElement.setAttribute("data-theme", theme);
				} catch (e) {
					document.documentElement.setAttribute("data-theme", "dark");
				}
			})();
		</script>

		<link rel="stylesheet" href="style.css" />

		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=IBM+Plex+Mono:wght@300;400;500&display=swap"
			rel="stylesheet"
		/>
		<link
			rel="stylesheet"
			href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
		/>
	</head>

	<body>
		<div id="loader" aria-hidden="true">
			<img src="logo.png" alt="" />
		</div>

		<!-- Ambient background -->
		<div class="atmosphere" aria-hidden="true">
			<div class="blob blob1"></div>
			<div class="blob blob2"></div>
			<div class="blob blob3"></div>
			<div class="watermark"><img src="logo.png" alt="" /></div>
		</div>

		<header class="controls">
			<button
				type="button"
				class="ctrl-btn"
				id="themeToggle"
				aria-label="Toggle light/dark theme"
			>
				<i class="bi bi-moon-stars" aria-hidden="true"></i>
			</button>

			<div
				class="lang-toggle"
				id="langToggle"
				role="button"
				tabindex="0"
				aria-label="Change language"
			>
				<span data-lang="pt">PT</span>
				<span data-lang="en">EN</span>
			</div>
		</header>

		<main class="main-content" id="mainContent">
			<section class="hero" id="hero" aria-label="Profile"></section>
			<div class="sections" id="sections"></div>

			<footer class="site-footer">
				<p class="footer-mark">© <span id="year"></span> Pedro Brito</p>
			</footer>
		</main>

		<script src="data.js"></script>
		<script src="script.js"></script>
	</body>
</html>
